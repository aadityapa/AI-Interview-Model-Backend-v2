# Karnex API Gateway — strangler routing (Phase 1)
# Preserves legacy paths (/auth, /job, /hr/candidates) so frontends need no change.

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events { worker_connections 2048; }

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;
  sendfile      on;
  keepalive_timeout 65;

  log_format karnex '$remote_addr - $request_id [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" upstream=$upstream_addr rt=$request_time';
  access_log /var/log/nginx/access.log karnex;

  # Rate limit zone (per IP) — tune in prod
  limit_req_zone $binary_remote_addr zone=api_limit:10m rate=60r/s;

  upstream monolith {
    server ai-interview:8010;
    keepalive 32;
  }
  upstream auth_service {
    server auth-service:8001;
    keepalive 8;
  }
  upstream candidate_service {
    server candidate-service:8002;
    keepalive 8;
  }
  upstream template_service {
    server template-service:8003;
    keepalive 8;
  }

  map $http_x_request_id $correlation_id {
    default $http_x_request_id;
    ""      $request_id;
  }

  server {
    listen 8080;
    server_name _;

    client_max_body_size 50m;
    proxy_read_timeout 300s;
    proxy_connect_timeout 10s;
    proxy_send_timeout 300s;

    location /health/live {
      access_log off;
      return 200 '{"status":"ok","service":"api-gateway"}';
      add_header Content-Type application/json;
    }

    # Phase 1 — extracted service boundaries (strangler proxies)
    location /auth/ {
      limit_req zone=api_limit burst=40 nodelay;
      proxy_pass http://auth_service/auth/;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Correlation-Id $correlation_id;
      proxy_set_header X-Karnex-Gateway "nginx";
    }

    location /hr/candidates {
      limit_req zone=api_limit burst=60 nodelay;
      proxy_pass http://candidate_service;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Correlation-Id $correlation_id;
      proxy_set_header X-Karnex-Gateway "nginx";
    }

    location /candidates/ranked {
      proxy_pass http://candidate_service;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Correlation-Id $correlation_id;
    }

    location /job/ {
      limit_req zone=api_limit burst=40 nodelay;
      proxy_pass http://template_service/job/;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Correlation-Id $correlation_id;
      proxy_set_header X-Karnex-Gateway "nginx";
    }

    location /masters/ {
      proxy_pass http://template_service/masters/;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Correlation-Id $correlation_id;
    }

    # Future: /api/* prefixed public API (mobile partners)
    location /api/auth/ {
      rewrite ^/api/(.*)$ /$1 break;
      proxy_pass http://auth_service;
      proxy_set_header Host $host;
      proxy_set_header X-Correlation-Id $correlation_id;
    }

    # Default — monolith (interview, reports, ATS, integrity, HR dashboard, etc.)
    location / {
      limit_req zone=api_limit burst=120 nodelay;
      proxy_pass http://monolith;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Correlation-Id $correlation_id;
      proxy_set_header X-Karnex-Gateway "nginx";
    }
  }
}
