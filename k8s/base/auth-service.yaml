apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: karnex
spec:
  replicas: 2
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      containers:
        - name: auth-service
          image: karnex/auth-service:latest
          env:
            - name: MONOLITH_URL
              value: http://ai-interview:8010
            - name: PORT
              value: "8001"
          ports:
            - containerPort: 8001
          livenessProbe:
            httpGet:
              path: /health/live
              port: 8001
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 8001
---
apiVersion: v1
kind: Service
metadata:
  name: auth-service
  namespace: karnex
spec:
  selector:
    app: auth-service
  ports:
    - port: 8001
      targetPort: 8001
