# Render Blueprint — backend API only (external Postgres on AWS RDS; no Render DB).
# Docs: docs/RENDER_DEPLOYMENT.md

services:
  - type: web
    name: ai-interview-backend
    runtime: docker
    plan: free
    region: oregon
    healthCheckPath: /health/live
    envVars:
      - key: UVICORN_WORKERS
        value: "1"
      - key: PROMPT_LOG_ENABLED
        value: "true"
      - key: PROMPT_LOG_FILE_ENABLED
        value: "false"
      - key: SMTP_ENABLED
        value: "false"
      - key: ALLOW_PUBLIC_HR_REGISTRATION
        value: "true"
      # IMPORTANT: keep these STABLE. Do NOT use generateValue — Render can
      # regenerate the value on service reconfig/blueprint re-apply, which
      # rotates the JWT signing key and logs every user out on the next call
      # (login -> immediate 401 -> auto-logout). Set a fixed long random value
      # once in the Render dashboard (Environment tab) and never change it.
      - key: AUTH_SECRET
        sync: false
      - key: REPORT_CODE
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_API_KEY_TTS
        sync: false
      - key: OPENAI_API_KEY_QUESTIONS
        sync: false
      - key: OPENAI_API_KEY_EVALUATION
        sync: false
      - key: OPENAI_API_KEY_TRANSCRIBE
        sync: false
      - key: AUTH_DB_URL
        sync: false
      - key: HR_RECORDS_IMPORT_ON_STARTUP
        value: "false"
      - key: CORS_ALLOW_ORIGINS
        value: "https://interview.karnex.in,https://ai-interview-model-frontend-v2.vercel.app"
      - key: PUBLIC_BASE_URL
        value: "https://interview.karnex.in"
